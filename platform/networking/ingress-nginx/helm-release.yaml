apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 10m0s
  chart:
    spec:
      chart: ingress-nginx
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      ingressClassResource:
        name: nginx
        enabled: true
        default: true
      ingressClass: nginx
      watchIngressWithoutClass: false
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
      publishService:
        enabled: true
      metrics:
        enabled: true
