apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: metallb
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
  values:
    crds:
      enabled: true
    controller:
      logLevel: info
    speaker:
      logLevel: info
      frr:
        enabled: false
    extraDeploy:
      - apiVersion: metallb.io/v1beta1
        kind: IPAddressPool
        metadata:
          name: vpn-pool
          namespace: metallb-system
        spec:
          addresses:
            - 10.102.13.220-10.102.13.230
      - apiVersion: metallb.io/v1beta1
        kind: L2Advertisement
        metadata:
          name: vpn-l2
          namespace: metallb-system
        spec:
          ipAddressPools:
            - vpn-pool
