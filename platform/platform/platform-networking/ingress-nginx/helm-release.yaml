apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  timeout: 15m0s
  interval: 10m0s
  dependsOn:
    - name: metallb
      namespace: metallb-system
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: ingress-nginx
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      ingressClassResource:
        name: nginx
        enabled: true
        default: true
      ingressClass: nginx
      watchIngressWithoutClass: false
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
      publishService:
        enabled: true
      metrics:
        enabled: true
      config:
        ssl-redirect: "false"
