apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: platform-identity
spec:
  interval: 10m0s
  timeout: 15m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: keycloak
      version: "0.19.0"
      sourceRef:
        kind: HelmRepository
        name: cloudpirates-oci
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: keycloak-values
      valuesKey: values.yaml
