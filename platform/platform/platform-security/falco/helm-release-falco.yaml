apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 10m0s
  timeout: 15m0s
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: falco
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  values:
    driver:
      enabled: true
      kind: modern_ebpf
      loader:
        enabled: false
    falco:
      json_output: true
      rules_files:
        - /etc/falco/falco_rules.yaml
        - /etc/falco/falco_rules.local.yaml
        - /etc/falco/rules.d
      http_output:
        enabled: true
        url: http://falcosidekick.falco-sidekick:2801/
        user_agent: falcosecurity/falco
    customRules:
      custom-rules.yaml: |-
        - rule: Exec Shell Bash
          desc: Detect /bin/bash execution
          condition: spawned_process and proc.exepath=/bin/bash
          output: "Bash executed (user=%user.name command=%proc.cmdline container=%container.name k8s.ns=%k8s.ns.name)"
          priority: WARNING
          tags: [shell, exec]

        - rule: Read Shadow File
          desc: Detect access to /etc/shadow
          condition: evt.type in (open,openat,openat2) and fd.name=/etc/shadow
          output: "Shadow file accessed (user=%user.name command=%proc.cmdline container=%container.name k8s.ns=%k8s.ns.name)"
          priority: CRITICAL
          tags: [credentials, filesystem]

        - rule: Curl or Wget in Container
          desc: Detect curl/wget execution in containers
          condition: spawned_process and proc.name in (curl,wget) and container
          output: "curl/wget executed (user=%user.name command=%proc.cmdline container=%container.name k8s.ns=%k8s.ns.name)"
          priority: WARNING
          tags: [network, exec]

        - rule: Reverse Shell Connect
          desc: Detect shell making outbound network connection
          condition: evt.type=connect and proc.name in (bash,sh) and fd.sip != 0.0.0.0
          output: "Possible reverse shell (user=%user.name command=%proc.cmdline dest=%fd.name container=%container.name k8s.ns=%k8s.ns.name)"
          priority: CRITICAL
          tags: [network, shell]

        - rule: Exec in Prod Namespace
          desc: Detect exec events in prod namespace
          condition: spawned_process and k8s.ns.name=prod
          output: "Process executed in prod namespace (user=%user.name command=%proc.cmdline container=%container.name)"
          priority: WARNING
          tags: [prod, exec]
    podSecurityContext: {}
    securityContext:
      privileged: true
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    rbac:
      create: true
    serviceAccount:
      create: true
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
