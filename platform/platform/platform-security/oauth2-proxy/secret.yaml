apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-creds
  namespace: oauth2-proxy
type: Opaque
stringData:
  client-id: oauth2-proxy
  client-secret: ChangeMe-OAuth2Proxy-Secret-123
  cookie-secret: 0123456789abcdef0123456789abcdef
  OAUTH2_PROXY_CLIENT_ID: oauth2-proxy
  OAUTH2_PROXY_CLIENT_SECRET: ChangeMe-OAuth2Proxy-Secret-123
  OAUTH2_PROXY_COOKIE_SECRET: 0123456789abcdef0123456789abcdef
