apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spire-postgresql
  namespace: spire-system
spec:
  interval: 10m0s
  timeout: 20m0s
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: bitnami-postgresql
    namespace: flux-system
  values:
    auth:
      database: spire
      username: spire
      password: SpireDBPass-2026-Demo
    primary:
      persistence:
        enabled: true
        size: 8Gi
        storageClass: local-path
