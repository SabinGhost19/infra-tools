apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spire-postgresql
  namespace: spire-system
spec:
  interval: 10m0s
  timeout: 20m0s
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: bitnami-postgresql
    namespace: flux-system
  values:
    auth:
      database: spire
      username: spire
      password: SpireDBPass-2026-Demo
    primary:
      extendedConfiguration: |
        max_connections = 200
        tcp_keepalives_idle = 60
        tcp_keepalives_interval = 30
        tcp_keepalives_count = 5
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      startupProbe:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 30
      livenessProbe:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 20
        timeoutSeconds: 5
        failureThreshold: 6
      readinessProbe:
        enabled: true
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
      persistence:
        enabled: true
        size: 8Gi
        storageClass: local-path
