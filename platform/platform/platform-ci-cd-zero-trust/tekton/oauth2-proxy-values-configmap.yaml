apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-tekton-values
  namespace: tekton-pipelines
data:
  values.yaml: |
    replicaCount: 2

    extraEnv:
      - name: OAUTH2_PROXY_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: oauth2-proxy-tekton-creds
            key: OAUTH2_PROXY_CLIENT_ID
      - name: OAUTH2_PROXY_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: oauth2-proxy-tekton-creds
            key: OAUTH2_PROXY_CLIENT_SECRET
      - name: OAUTH2_PROXY_COOKIE_SECRET
        valueFrom:
          secretKeyRef:
            name: oauth2-proxy-tekton-creds
            key: OAUTH2_PROXY_COOKIE_SECRET

    extraArgs:
      provider: keycloak-oidc
      http-address: 0.0.0.0:4180
      upstream: http://tekton-dashboard.tekton-pipelines.svc.cluster.local:9097
      redirect-url: https://tekton.licenta.local/oauth2/callback
      oidc-issuer-url: http://keycloak.licenta.ro/realms/ZeroTrust-Realm
      scope: openid profile email groups
      email-domain: "*"
      cookie-secure: "true"
      cookie-httponly: "true"
      cookie-samesite: lax
      skip-provider-button: "true"
      reverse-proxy: "true"

    service:
      portNumber: 80
