apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tekton-dashboard
  namespace: tekton-pipelines
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-test
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - tekton.licenta.local
      secretName: tekton-dashboard-tls
  rules:
    - host: tekton.licenta.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-tekton-dashboard
                port:
                  number: 80
