apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tekton-operator
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 20m0s
  driftDetection:
    mode: enabled
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  targetNamespace: tekton-operator
  chart:
    spec:
      chart: charts/tekton-operator
      sourceRef:
        kind: GitRepository
        name: tekton-operator-chart
        namespace: flux-system
  values:
    fullnameOverride: tekton-operator
    nameOverride: tekton-operator
    installCRDs: true
