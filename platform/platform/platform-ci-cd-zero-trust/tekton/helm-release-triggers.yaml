apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tekton-triggers
  namespace: tekton-pipelines
spec:
  dependsOn:
    - name: tekton-pipeline
  interval: 10m0s
  timeout: 10m0s
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: tekton-triggers
      sourceRef:
        kind: HelmRepository
        name: tekton
        namespace: flux-system
  values:
    eventlisteners:
      replicas: 2
