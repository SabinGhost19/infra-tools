apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: harbor-project-bootstrap
  namespace: harbor
spec:
  interval: 10m
  approvePlan: auto
  alwaysCleanupRunnerPod: true
  destroyResourcesOnDeletion: false
  sourceRef:
    kind: GitRepository
    name: infra-tools
    namespace: flux-system
  path: ./platform/platform/platform-ci-cd-zero-trust/harbor/terraform
  serviceAccountName: tf-runner
  writeOutputsToSecret:
    name: harbor-project-bootstrap-outputs
  backendConfig:
    customConfiguration: |
      backend "kubernetes" {
        secret_suffix     = "harbor-project-bootstrap"
        namespace         = "harbor"
        in_cluster_config = true
      }
