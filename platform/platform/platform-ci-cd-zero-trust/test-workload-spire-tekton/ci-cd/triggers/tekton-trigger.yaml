apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: zt-cicd-binding
  namespace: test-workload-spire-tekton
spec:
  params:
    - name: gitrevision
      value: $(body.metadata.revision)
    - name: gitrepositoryurl
      value: https://github.com/SabinGhost19/infra-tools
    - name: image
      value: harbor.licenta.local/test-project/test-cicd-app:main
    - name: context
      value: apps/test-cicd-app
    - name: dockerfile
      value: apps/test-cicd-app/Dockerfile
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: zt-cicd-template
  namespace: test-workload-spire-tekton
spec:
  params:
    - name: gitrevision
    - name: gitrepositoryurl
    - name: image
    - name: context
    - name: dockerfile
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: zt-cicd-
        namespace: test-workload-spire-tekton
      spec:
        taskRunTemplate:
          serviceAccountName: tekton-builder
        pipelineRef:
          name: zero-trust-cicd
        params:
          - name: git-revision
            value: $(tt.params.gitrevision)
          - name: git-url
            value: $(tt.params.gitrepositoryurl)
          - name: image
            value: $(tt.params.image)
          - name: context
            value: $(tt.params.context)
          - name: dockerfile
            value: $(tt.params.dockerfile)
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: zt-cicd-listener
  namespace: test-workload-spire-tekton
spec:
  serviceAccountName: tekton-builder
  resources:
    kubernetesResource:
      serviceType: ClusterIP
      spec:
        template:
          metadata:
            annotations:
              sidecar.istio.io/inject: "false"
  triggers:
    - name: flux-test-env-trigger
      interceptors:
        - ref:
            name: cel
          params:
            - name: filter
              value: body.metadata.sourcePath == 'apps/test-cicd-app' && body.metadata.gpgSigned == 'true'
      bindings:
        - ref: zt-cicd-binding
      template:
        ref: zt-cicd-template
