apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone-local
  namespace: test-workload-spire-tekton
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
    - name: run-id
      type: string
  workspaces:
    - name: output
  steps:
    - name: clone
      image: alpine/git:2.47.1
      script: |
        RUN_DIR="$(workspaces.output.path)/$(params.run-id)"
        rm -rf "$RUN_DIR"
        mkdir -p "$RUN_DIR"
        git clone "$(params.url)" "$RUN_DIR"
        cd "$RUN_DIR"
        REV="$(params.revision)"
        if echo "$REV" | grep -q '@sha1:'; then
          REV="${REV##*@sha1:}"
        fi
        git checkout "$REV"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-scan
  namespace: test-workload-spire-tekton
spec:
  params:
    - name: image
      type: string
    - name: severity
      type: string
      default: CRITICAL
  steps:
    - name: scan
      image: aquasec/trivy:0.58.1
      script: |
        cat /var/run/secrets/tekton/harbor-ca/ca.crt >> /etc/ssl/certs/ca-certificates.crt
        TRIVY_USERNAME="$(cat /var/run/secrets/tekton/harbor/HARBOR_USERNAME)"
        TRIVY_PASSWORD="$(cat /var/run/secrets/tekton/harbor/HARBOR_PASSWORD)"
        trivy image --username "$TRIVY_USERNAME" --password "$TRIVY_PASSWORD" --scanners vuln --severity "$(params.severity)" --exit-code 1 --no-progress "$(params.image)"
      volumeMounts:
        - name: harbor-credentials
          mountPath: /var/run/secrets/tekton/harbor
          readOnly: true
        - name: harbor-ca
          mountPath: /var/run/secrets/tekton/harbor-ca
          readOnly: true
  volumes:
    - name: harbor-credentials
      secret:
        secretName: harbor-robot-credentials
    - name: harbor-ca
      secret:
        secretName: harbor-ca
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build
  namespace: test-workload-spire-tekton
spec:
  results:
    - name: image-digest
      description: Pushed OCI image digest.
  params:
    - name: image
      type: string
    - name: context
      type: string
      default: .
    - name: dockerfile
      type: string
      default: Dockerfile
    - name: run-id
      type: string
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:debug
      env:
        - name: DOCKER_CONFIG
          value: /tekton/home/.docker
      command: ["/busybox/sh", "-c"]
      args:
        - |
          mkdir -p /tekton/home/.docker
          cat <<EOF > /tekton/home/.docker/config.json
          {
            "auths": {
              "harbor.licenta.local": {
                "username": "$(cat /var/run/secrets/tekton/harbor/HARBOR_USERNAME)",
                "password": "$(cat /var/run/secrets/tekton/harbor/HARBOR_PASSWORD)"
              }
            }
          }
          EOF
          cat /var/run/secrets/tekton/harbor-ca/ca.crt >> /kaniko/ssl/certs/ca-certificates.crt
          /kaniko/executor \
            --context="$(workspaces.source.path)/$(params.run-id)/$(params.context)" \
            --dockerfile="$(workspaces.source.path)/$(params.run-id)/$(params.dockerfile)" \
            --skip-tls-verify-registry=harbor.licenta.local \
            --skip-tls-verify \
            --digest-file=/tekton/results/image-digest \
            --destination="$(params.image)"
      volumeMounts:
        - name: harbor-credentials
          mountPath: /var/run/secrets/tekton/harbor
          readOnly: true
        - name: harbor-ca
          mountPath: /var/run/secrets/tekton/harbor-ca
          readOnly: true
  volumes:
    - name: harbor-credentials
      secret:
        secretName: harbor-robot-credentials
    - name: harbor-ca
      secret:
        secretName: harbor-ca
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cosign-sign
  namespace: test-workload-spire-tekton
spec:
  params:
    - name: image
      type: string
    - name: digest
      type: string
  steps:
    - name: sign
      image: ghcr.io/sigstore/cosign/cosign:v2.4.1
      env:
        - name: COSIGN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cosign-keypair
              key: cosign.password
      script: |
        cat /var/run/secrets/tekton/harbor-ca/ca.crt >> /etc/ssl/certs/ca-certificates.crt
        HARBOR_USERNAME="$(cat /var/run/secrets/tekton/harbor/HARBOR_USERNAME)"
        HARBOR_PASSWORD="$(cat /var/run/secrets/tekton/harbor/HARBOR_PASSWORD)"
        cosign login harbor.licenta.local -u "$HARBOR_USERNAME" -p "$HARBOR_PASSWORD"
        cosign sign --yes --key /var/run/secrets/tekton/cosign/cosign.key "$(params.image)@$(params.digest)"
      volumeMounts:
        - name: cosign-keypair
          mountPath: /var/run/secrets/tekton/cosign
          readOnly: true
        - name: harbor-credentials
          mountPath: /var/run/secrets/tekton/harbor
          readOnly: true
        - name: harbor-ca
          mountPath: /var/run/secrets/tekton/harbor-ca
          readOnly: true
  volumes:
    - name: cosign-keypair
      secret:
        secretName: cosign-keypair
    - name: harbor-credentials
      secret:
        secretName: harbor-robot-credentials
    - name: harbor-ca
      secret:
        secretName: harbor-ca
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: zero-trust-cicd
  namespace: test-workload-spire-tekton
spec:
  params:
    - name: image
      type: string
    - name: git-url
      type: string
    - name: git-revision
      type: string
    - name: run-id
      type: string
    - name: context
      type: string
      default: apps/test-cicd-app
    - name: dockerfile
      type: string
      default: apps/test-cicd-app/Dockerfile
    - name: trivy-severity
      type: string
      default: CRITICAL
  workspaces:
    - name: shared-workspace
  tasks:
    - name: fetch-source
      taskRef:
        name: git-clone-local
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
        - name: run-id
          value: $(params.run-id)
      workspaces:
        - name: output
          workspace: shared-workspace
    - name: build
      runAfter:
        - fetch-source
      taskRef:
        name: kaniko-build
      params:
        - name: image
          value: $(params.image)
        - name: context
          value: $(params.context)
        - name: dockerfile
          value: $(params.dockerfile)
        - name: run-id
          value: $(params.run-id)
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: trivy
      runAfter:
        - build
      taskRef:
        name: trivy-scan
      params:
        - name: image
          value: $(params.image)
        - name: severity
          value: $(params.trivy-severity)
    - name: sign
      runAfter:
        - trivy
      taskRef:
        name: cosign-sign
      params:
        - name: image
          value: $(params.image)
        - name: digest
          value: $(tasks.build.results.image-digest)
