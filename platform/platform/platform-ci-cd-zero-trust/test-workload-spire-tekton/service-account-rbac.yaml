apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-builder
  namespace: test-workload-spire-tekton
  labels:
    security.licenta/attested: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tekton-builder
  namespace: test-workload-spire-tekton
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "secrets", "configmaps", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["tekton.dev"]
    resources: ["taskruns", "pipelineruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-builder
  namespace: test-workload-spire-tekton
subjects:
  - kind: ServiceAccount
    name: tekton-builder
    namespace: test-workload-spire-tekton
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tekton-builder
