apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: keycloak-clients-bootstrap
  namespace: platform-identity
spec:
  interval: 10m
  approvePlan: auto
  retryInterval: 2m
  remediation:
    retries: 8
  destroyResourcesOnDeletion: false
  sourceRef:
    kind: GitRepository
    name: infra-tools
    namespace: flux-system
  path: ./platform/platform/platform-ci-cd-zero-trust/keycloak-bootstrap/terraform
  serviceAccountName: tf-runner
  writeOutputsToSecret:
    name: keycloak-clients-bootstrap-outputs
  backendConfig:
    customConfiguration: |
      backend "kubernetes" {
        secret_suffix     = "keycloak-clients-bootstrap"
        namespace         = "platform-identity"
        in_cluster_config = true
      }
