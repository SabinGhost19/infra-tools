apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pod-security-baseline-audit
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: disallow-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: Privileged containers are not allowed.
        pattern:
          spec:
            =(containers):
              - =(securityContext):
                  X(privileged): "false"
