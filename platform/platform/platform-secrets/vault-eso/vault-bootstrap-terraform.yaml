apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: vault-bootstrap
  namespace: vault
spec:
  interval: 10m
  approvePlan: auto
  destroyResourcesOnDeletion: false
  sourceRef:
    kind: GitRepository
    name: infra-tools
    namespace: flux-system
  path: ./platform/platform/platform-secrets/vault-eso/terraform
  serviceAccountName: tf-runner
  writeOutputsToSecret:
    name: vault-bootstrap-outputs
  backendConfig:
    customConfiguration: |
      backend "kubernetes" {
        secret_suffix     = "vault-bootstrap"
        namespace         = "vault"
        in_cluster_config = true
      }
