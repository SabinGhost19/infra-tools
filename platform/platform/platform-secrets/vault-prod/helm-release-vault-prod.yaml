apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-prod
  namespace: vault-prod
spec:
  interval: 10m0s
  chart:
    spec:
      chart: vault
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  values:
    ui:
      enabled: true
    server:
      dev:
        enabled: false
      ha:
        enabled: true
        replicas: 2
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true
            listener "tcp" {
              address = "[::]:8200"
              cluster_address = "[::]:8201"
              tls_disable = 1
            }
            seal "transit" {
              address            = "http://vault.vault.svc.cluster.local:8200"
              token              = "root"
              key_name           = "autounseal"
              mount_path         = "transit/"
              disable_renewal    = "true"
              tls_skip_verify    = "true"
            }
            storage "raft" {
              path = "/vault/data"
            }
            service_registration "kubernetes" {}
      dataStorage:
        enabled: true
        size: 10Gi
      auditStorage:
        enabled: true
        size: 10Gi
