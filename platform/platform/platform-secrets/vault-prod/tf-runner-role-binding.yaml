apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-runner
  namespace: vault-prod
subjects:
  - kind: ServiceAccount
    name: tf-runner
    namespace: vault-prod
  - kind: ServiceAccount
    name: tf-runner
    namespace: harbor
  - kind: ServiceAccount
    name: tf-runner
    namespace: platform-identity
  - kind: ServiceAccount
    name: tf-runner
    namespace: minio-tenant
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tf-runner
