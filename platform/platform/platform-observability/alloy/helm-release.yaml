apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  dependsOn:
    - name: loki
      namespace: monitoring
    - name: kube-prometheus-stack
      namespace: operators-monitoring
    - name: tempo
      namespace: monitoring
  interval: 10m0s
  chart:
    spec:
      chart: alloy
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    alloy:
      configMap:
        create: true
        content: |-
          loki.write "default" {
            endpoint {
              url = "http://loki.monitoring:3100/loki/api/v1/push"
            }
          }

          prometheus.remote_write "default" {
            endpoint {
              url = "http://kube-prometheus-stack-prometheus.operators-monitoring:9090/api/v1/write"
            }
          }

          prometheus.exporter.unix "node" {
            set_collectors = ["cpu", "filesystem", "loadavg", "meminfo", "netdev", "stat", "time", "uname"]
          }

          discovery.relabel "node_metrics" {
            targets = prometheus.exporter.unix.node.targets

            rule {
              target_label = "job"
              replacement  = "alloy-node-exporter"
            }
          }

          prometheus.scrape "node_metrics" {
            targets    = discovery.relabel.node_metrics.output
            forward_to = [prometheus.remote_write.default.receiver]
          }

          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "deployment"
              action        = "replace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app"]
              target_label  = "deployment"
              action        = "replace"
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.process.add_stream.receiver]
          }

          loki.process "add_stream" {
            stage.static_labels {
              values = {
                stream = "stdout",
              }
            }
            forward_to = [loki.write.default.receiver]
          }

          otelcol.receiver.otlp "default" {
            grpc {
              endpoint = "0.0.0.0:4317"
            }

            http {
              endpoint = "0.0.0.0:4318"
            }

            output {
              traces = [otelcol.processor.batch.traces.input]
            }
          }

          otelcol.processor.batch "traces" {
            output {
              traces = [otelcol.exporter.otlp.tempo.input]
            }
          }

          otelcol.exporter.otlp "tempo" {
            client {
              endpoint = "tempo.monitoring:4317"
              tls {
                insecure = true
              }
            }
          }
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
      extraVolumes:
        - name: tmp
          emptyDir: {}
      extraVolumeMounts:
        - name: tmp
          mountPath: /tmp
    controller:
      type: daemonset
    rbac:
      create: true
    serviceAccount:
      create: true
