apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 10m0s
  chart:
    spec:
      chart: loki
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    deploymentMode: SingleBinary
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 10Gi
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    loki:
      auth_enabled: false
      server:
        grpc_server_max_recv_msg_size: 104857600
        grpc_server_max_send_msg_size: 104857600
      frontend:
        grpc_client_config:
          max_recv_msg_size: 104857600
          max_send_msg_size: 104857600
      query_scheduler:
        grpc_client_config:
          max_recv_msg_size: 104857600
          max_send_msg_size: 104857600
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 24h
        ingestion_rate_mb: 16
        ingestion_burst_size_mb: 32
        max_query_length: 25h
        max_entries_limit_per_query: 50000
      compactor:
        retention_enabled: true
        retention_delete_delay: 2h
        delete_request_store: filesystem
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false
    minio:
      enabled: false
    gateway:
      enabled: false
    rbac:
      create: true
    serviceAccount:
      create: true
