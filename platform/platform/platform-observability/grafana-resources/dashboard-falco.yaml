apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: falco-security-alerts
  namespace: grafana
  labels:
    app: grafana-dashboards
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: Security
  json: |
    {
      "id": null,
      "uid": "falco-security",
      "title": "Falco Security Alerts",
      "description": "Real-time monitoring of Falco runtime security events",
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": "label_values({source=\"syscall\"}, k8s_ns_name)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total Falco Alerts (1h)",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "count_over_time({source=\"syscall\"}[1h])", "legendFormat": "Total" }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["sum"] } },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 5 },
                { "color": "red", "value": 20 }
              ]}
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "CRITICAL Alerts (1h)",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "count_over_time({source=\"syscall\"} |~ \"Critical\"[1h])", "legendFormat": "Critical" }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["sum"] } },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "red" } } },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Reverse Shell Attempts (1h)",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "count_over_time({source=\"syscall\"} |~ \"(?i)reverse.*shell\"[1h])", "legendFormat": "Reverse Shell" }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["sum"] } },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "dark-red" } } },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Shadow File Access (1h)",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "count_over_time({source=\"syscall\"} |~ \"(?i)shadow\"[1h])", "legendFormat": "Shadow" }],
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["sum"] } },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "orange" } } },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Falco Alert Rate Over Time",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            { "expr": "sum(rate({source=\"syscall\"} |~ \"Critical\"[2m]))", "legendFormat": "CRITICAL/min" },
            { "expr": "sum(rate({source=\"syscall\"} |~ \"Notice\"[2m]))", "legendFormat": "NOTICE/min" }
          ],
          "fieldConfig": {
            "defaults": { "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 } }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 4 }
        },
        {
          "id": 6,
          "type": "logs",
          "title": "CRITICAL Security Events",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{source=\"syscall\"} |~ \"Critical\"" }],
          "options": { "showLabels": true, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 }
        },
        {
          "id": 7,
          "type": "logs",
          "title": "NOTICE Security Events",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{source=\"syscall\"} |~ \"Notice\"" }],
          "options": { "showLabels": true, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 }
        },
        {
          "id": 8,
          "type": "logs",
          "title": "All Falco Events",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{source=\"syscall\"}" }],
          "options": { "showLabels": true, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 20 }
        },
        {
          "id": 9,
          "type": "logs",
          "title": "Falco-Talon Auto-Response Actions",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{namespace=\"falco-talon\"}" }],
          "options": { "showLabels": true, "showTime": true, "sortOrder": "Descending" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 30 }
        },
        {
          "id": 10,
          "type": "logs",
          "title": "Falcosidekick Forwarding Log",
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{ "expr": "{namespace=\"falco-sidekick\"}" }],
          "options": { "showLabels": true, "showTime": true, "sortOrder": "Descending" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 30 }
        }
      ]
    }
