apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: tempo-overview
  namespace: monitoring
  labels:
    app: grafana-dashboards
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
    - inputName: DS_TEMPO
      datasourceName: Tempo
    - inputName: DS_LOKI
      datasourceName: Loki
  folder: Tracing
  grafanaCom:
    id: 19419
    revision: 3
