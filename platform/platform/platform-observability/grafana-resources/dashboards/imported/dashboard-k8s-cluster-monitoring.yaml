apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-cluster-monitoring
  namespace: monitoring
  labels:
    app: grafana-dashboards
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
  folder: Kubernetes
  grafanaCom:
    id: 315
    revision: 3
