apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: monitoring
spec:
  interval: 10m0s
  chart:
    spec:
      chart: tempo
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    tempo:
      reportingEnabled: false
      metricsGenerator:
        enabled: true
        remoteWriteUrl: "http://platform-prometheus.monitoring:9090/api/v1/write"
      overrides:
        defaults:
          metrics_generator:
            processors:
              - service-graphs
              - span-metrics
    persistence:
      enabled: true
      size: 10Gi
    serviceMonitor:
      enabled: true
