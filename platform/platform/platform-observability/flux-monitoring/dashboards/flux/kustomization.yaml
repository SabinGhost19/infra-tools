apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

configMapGenerator:
  - name: flux-dashboard-cluster
    files:
      - cluster.json=json/cluster.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: flux-dashboard-control-plane
    files:
      - control-plane.json=json/control-plane.json
    options:
      labels:
        grafana_dashboard: "1"
  - name: flux-dashboard-logs
    files:
      - logs.json=json/logs.json
    options:
      labels:
        grafana_dashboard: "1"

generatorOptions:
  disableNameSuffixHash: true
