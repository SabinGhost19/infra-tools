apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: operators-monitoring
spec:
  interval: 10m0s
  install:
    timeout: 15m0s
    remediation:
      retries: 3
  upgrade:
    timeout: 15m0s
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.13.5
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    grafana:
      enabled: false
    alertmanager:
      enabled: false
    prometheusOperator:
      enabled: true
    prometheus:
      enabled: false
    kube-state-metrics:
      enabled: false
    nodeExporter:
      enabled: false
    prometheus-node-exporter:
      enabled: false
