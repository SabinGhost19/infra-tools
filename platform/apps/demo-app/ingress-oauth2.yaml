apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-oauth2-endpoints
  namespace: demo-app
spec:
  ingressClassName: nginx
  rules:
    - host: demo.licenta.ro
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 80
          - path: /favicon.ico
            pathType: Exact
            backend:
              service:
                name: demo-nginx
                port:
                  number: 80
