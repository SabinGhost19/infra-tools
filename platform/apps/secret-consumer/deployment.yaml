apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-secret-consumer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-secret-consumer
  template:
    metadata:
      labels:
        app: custom-secret-consumer
    spec:
      containers:
        - name: consumer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                echo "[consumer] API_KEY=$(cat /etc/custom-secret/API_KEY)";
                echo "[consumer] API_TOKEN length=$(wc -c </etc/custom-secret/API_TOKEN)";
                sleep 30;
              done
          volumeMounts:
            - name: custom-secret-vol
              mountPath: /etc/custom-secret
              readOnly: true
      volumes:
        - name: custom-secret-vol
          secret:
            secretName: custom-app-secret
