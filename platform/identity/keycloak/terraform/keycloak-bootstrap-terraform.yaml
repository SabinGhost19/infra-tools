apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: keycloak-bootstrap
  namespace: platform-day2
spec:
  interval: 10m
  approvePlan: auto
  destroyResourcesOnDeletion: false
  sourceRef:
    kind: GitRepository
    name: infra-tools
    namespace: flux-system
  path: ./platform/identity/keycloak/terraform/tf
  writeOutputsToSecret:
    name: keycloak-bootstrap-outputs
  backendConfig:
    customConfiguration: |
      backend "kubernetes" {
        secret_suffix     = "keycloak-bootstrap"
        namespace         = "platform-day2"
        in_cluster_config = true
      }
  runnerPodTemplate:
    spec:
      env:
        - name: TF_VAR_keycloak_base_url
          value: "http://keycloak.platform-identity.svc.cluster.local"
        - name: TF_VAR_keycloak_user
          valueFrom:
            secretKeyRef:
              name: keycloak-provider-creds
              key: KEYCLOAK_USER
        - name: TF_VAR_keycloak_password
          valueFrom:
            secretKeyRef:
              name: keycloak-provider-creds
              key: KEYCLOAK_PASSWORD
