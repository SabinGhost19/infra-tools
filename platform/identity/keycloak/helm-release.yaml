apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: platform-identity
spec:
  interval: 10m0s
  chart:
    spec:
      chart: keycloak
      version: "0.19.0"
      sourceRef:
        kind: HelmRepository
        name: cloudpirates-oci
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: keycloak-values
      valuesKey: values.yaml
