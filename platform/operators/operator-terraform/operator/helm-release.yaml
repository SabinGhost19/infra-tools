apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tf-controller
  namespace: tf-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: tofu-controller
      version: "0.16.2"
      sourceRef:
        kind: HelmRepository
        name: tf-controller
        namespace: flux-system
  values:
    awsPackage:
      install: false
    replicaCount: 1
    watchAllNamespaces: true
    logEncoding: console
    logLevel: info
    runner:
      image:
        pullPolicy: IfNotPresent
