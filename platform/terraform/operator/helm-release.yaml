apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tf-controller
  namespace: tf-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: tf-controller
      sourceRef:
        kind: HelmRepository
        name: tf-controller
        namespace: flux-system
  values:
    replicaCount: 1
    watchAllNamespaces: true
    logEncoding: console
    logLevel: info
    runner:
      image:
        pullPolicy: IfNotPresent
