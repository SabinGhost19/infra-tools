apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: custom-app-secret
  namespace: default
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: custom-app-secret
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: prod/custom-app/config
        property: api_key
    - secretKey: API_TOKEN
      remoteRef:
        key: prod/custom-app/config
        property: api_token
