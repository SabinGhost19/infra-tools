apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth-reviewer
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-auth-reviewer
    namespace: vault
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap-v2
  namespace: vault
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: vault-auth-reviewer
      restartPolicy: OnFailure
      containers:
        - name: vault-bootstrap
          image: hashicorp/vault:1.16.2
          imagePullPolicy: IfNotPresent
          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc.cluster.local:8200
            - name: VAULT_TOKEN
              value: root
          command:
            - /bin/sh
            - -ec
            - |
              # Wait for Vault API to be reachable before configuration.
              for i in $(seq 1 60); do
                if vault status >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done

              vault auth list -format=json | grep -q '"kubernetes/"' || vault auth enable kubernetes

              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc" \
                token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
                kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              cat <<'EOF' >/tmp/demo-api-policy.hcl
              path "secret/data/prod/demo-api/*" {
                capabilities = ["read"]
              }
              EOF
              vault policy write demo-api-policy /tmp/demo-api-policy.hcl

              vault write auth/kubernetes/role/demo-api-prod-role \
                bound_service_account_names="default,external-secrets" \
                bound_service_account_namespaces="default,external-secrets" \
                token_policies="demo-api-policy" \
                token_ttl="1h"

              vault kv put secret/prod/demo-api/config \
                username="demo_user" \
                password="demo_pass_v1"
